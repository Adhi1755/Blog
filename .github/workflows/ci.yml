name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  # ── Frontend (Next.js) ─────────────────────────────────────────
  frontend:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Next.js ESLint)
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ── Backend (Flask / Python) ────────────────────────────────────
  backend:
    name: Backend – Install & Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          # Hard-fail on syntax errors and undefined names only
          flake8 backend/app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style warnings (max-line-length=120 set in .flake8) — non-blocking
          flake8 backend/app.py --count --statistics --exit-zero
